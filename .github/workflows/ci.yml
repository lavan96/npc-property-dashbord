name: CI

# Verification gate for the Template Builder rehaul (and the repo generally).
# `test` runs the golden-render isolation guard, so any change that alters
# renderer output (i.e. touches the WeasyPrint/jsPDF path) fails here.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` is intentionally NOT used: the committed package-lock.json is
      # out of sync with package.json on main (missing rolldown/emnapi platform
      # binaries etc.), which makes `npm ci` abort. `npm install` reconciles the
      # lockfile and installs. Swap back to `npm ci` once the lockfile is regenerated.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Golden-render isolation guard, run as its own step so a renderer
      # regression (anything that changes the WeasyPrint/jsPDF output, incl. the
      # reconstruction primitives: vector/table/runs/numeric-weight/@font-face)
      # is attributed clearly instead of buried in the broader suite.
      - name: Golden-render isolation guard (renderers must stay byte-stable)
        run: npx vitest run src/lib/reportTemplate/__tests__/goldenRender.spec.ts

      # Scoped to the Template Builder test surface (all editor logic). The wider
      # repo has pre-existing failing/flaky suites (e.g. src/utils finance scenario
      # tests) unrelated to this rehaul; `npm run build` below still type-checks the
      # entire app, including the editor edits.
      - name: Unit tests (Template Builder surface)
        run: npx vitest run src/lib/reportTemplate

      - name: Build
        run: npm run build

  # Security Remediation Phase 12 (CI-001): the security gate blocks
  # reintroduction of the audited vulnerability classes and unclassified
  # edge functions.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate deterministic security inventory (WP-00)
        run: npm run security:inventory && git diff --exit-code -- docs/security/SECURITY_INVENTORY.json

      - name: Edge Function registry and baseline check (WP-00)
        run: npm run security:registry

      - name: Static auth-pattern scan (F-01/F-06/CORS/body-trust/public-URL rules)
        run: npm run security:static

      # Type-check the shared trust libraries with Deno. A type error in these
      # (auth, authz, permissions, notify, reset tokens) breaks the whole
      # function fleet at runtime and can escape the frontend-only build — the
      # exact class the second-round audit flagged (e.g. a missing import
      # surfacing only at Edge runtime).
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno type-check shared trust modules
        run: |
          deno check \
            supabase/functions/_shared/auth.ts \
            supabase/functions/_shared/auth_v2.ts \
            supabase/functions/_shared/authz.ts \
            supabase/functions/_shared/permissions.ts \
            supabase/functions/_shared/notify.ts \
            supabase/functions/_shared/resetTokens.ts \
            supabase/functions/_shared/jwt.ts

      # WP-14: type-check every Edge Function entry point, not only shared modules.
      - name: Deno type-check every Edge Function entry point (WP-14)
        run: node scripts/security/check-edge-functions.mjs

      # WP-12: block reintroduction of legacy internal-auth trust paths.
      - name: Internal-auth legacy-fallback gate (WP-12)
        run: node scripts/security/check-internal-legacy-fallback.mjs

      # WP-05C: enforce agent-tool bulk ceilings and policy registration.
      - name: Agent tool policy gate (WP-05A/05C)
        run: |
          node scripts/security/check-agent-tool-policies.mjs
          node scripts/security/check-agent-bulk-ceilings.mjs

      # WP-15: launch-gate aggregator (registry clean + WP-15 artefacts present).
      - name: WP-15 launch-gate aggregator
        run: node scripts/security/wp15-launch-gate.mjs

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Security Remediation Phase 11 (SUPPLY-001): supply-chain visibility.
  # Fails on unaccepted critical dependency vulnerabilities and publishes a
  # CycloneDX SBOM artifact for each build.
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm install` (not `npm ci`) to match the verify job — the committed
      # lockfile is intentionally out of sync on main (see verify job note).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Blocks on unaccepted `critical` advisories by default; lower-severity
      # findings are reported but non-blocking. Tune via SECURITY_AUDIT_LEVEL.
      - name: Dependency vulnerability gate (SUPPLY-001)
        env:
          SECURITY_AUDIT_LEVEL: critical
        run: node scripts/security/dependency-audit.mjs

      # CycloneDX SBOM for the installed dependency graph. Uploaded as an
      # artifact so releases have a machine-readable bill of materials.
      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm@^1 --output-file sbom.cdx.json --output-format json || echo "SBOM generation skipped (non-fatal)"

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn
