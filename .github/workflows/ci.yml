name: CI

# Verification gate for the Template Builder rehaul (and the repo generally).
# `test` runs the golden-render isolation guard, so any change that alters
# renderer output (i.e. touches the WeasyPrint/jsPDF path) fails here.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (incl. golden-render isolation guard)
        run: npm test

      - name: Build
        run: npm run build
