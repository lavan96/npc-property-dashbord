<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stamp Duty Calculator</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 16px;
      background: #ffffff;
    }
    #stamp-duty-calculator {
      width: 100%;
    }
    .source-link {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }
    .source-link a {
      color: #0066cc;
    }
  </style>
</head>
<body>
  <div class="source-link">
    Stamp Duty Calculator from <a href="https://calculatorsonline.com.au" target="_blank" rel="noopener noreferrer">calculatorsonline.com.au</a>
  </div>
  
  <div id="stamp-duty-calculator" class="orange-theme">
    <div id="stamp-duty-anchors">
      <noscript>Please enable JavaScript to use the Stamp Duty Calculator.</noscript>
    </div>
  </div>

  <script>
    // Parse state from URL query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const state = urlParams.get('state') || 'All';
    
    // Load the calculator script with the detected state
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://calculatorsonline.com.au/external/!main/stamp_duty.min.js';
    script.setAttribute('data-state', state);
    document.body.appendChild(script);

    // Store the last captured value
    let lastCapturedValue = null;

    // Function to find and extract stamp duty value from the calculator
    function findStampDutyValue() {
      // First, look specifically for "Total" or "Stamp Duty" labeled values
      // These calculators typically show the total prominently
      const allElements = document.querySelectorAll('*');
      
      for (const el of allElements) {
        const text = (el.textContent || el.innerText || '').toLowerCase();
        
        // Look for elements containing "total" or "stamp duty" with a dollar value
        if (text.includes('total') || text.includes('stamp duty')) {
          // Check if this element or its parent contains a dollar amount
          const fullText = el.textContent || el.innerText || '';
          const match = fullText.match(/\$\s*([\d,]+(?:\.\d{2})?)/);
          if (match) {
            const value = match[1].replace(/,/g, '');
            const numValue = parseFloat(value);
            // Stamp duty can be quite high for expensive properties
            if (numValue > 0 && numValue < 1000000) {
              return numValue;
            }
          }
        }
      }

      // Try specific selectors for calculator results
      const selectors = [
        '[class*="total"]',
        '[class*="result"]',
        '[id*="total"]',
        '[id*="result"]',
        '.stamp-duty-result',
        '.calculator-result'
      ];

      for (const selector of selectors) {
        const elements = document.querySelectorAll(selector);
        for (const el of elements) {
          const text = el.textContent || el.innerText || '';
          const match = text.match(/\$\s*([\d,]+(?:\.\d{2})?)/);
          if (match) {
            const value = match[1].replace(/,/g, '');
            const numValue = parseFloat(value);
            if (numValue > 0 && numValue < 1000000) {
              return numValue;
            }
          }
        }
      }

      // Fallback: scan all text nodes for dollar amounts and find the largest
      // that appears after "total" or is the last significant value shown
      const walker = document.createTreeWalker(
        document.body,
        NodeFilter.SHOW_TEXT,
        null,
        false
      );

      const dollarAmounts = [];
      let foundTotal = false;
      
      while (walker.nextNode()) {
        const text = walker.currentNode.textContent || '';
        
        if (text.toLowerCase().includes('total')) {
          foundTotal = true;
        }
        
        const matches = text.matchAll(/\$\s*([\d,]+(?:\.\d{2})?)/g);
        for (const match of matches) {
          const value = match[1].replace(/,/g, '');
          const numValue = parseFloat(value);
          if (numValue > 0 && numValue < 1000000) {
            dollarAmounts.push({ value: numValue, afterTotal: foundTotal });
          }
        }
      }

      // Prefer values that appeared after "total" text
      const afterTotalValues = dollarAmounts.filter(v => v.afterTotal);
      if (afterTotalValues.length > 0) {
        return Math.max(...afterTotalValues.map(v => v.value));
      }

      // Otherwise return the largest value (likely the total stamp duty)
      if (dollarAmounts.length > 0) {
        return Math.max(...dollarAmounts.map(v => v.value));
      }

      return null;
    }

    // Listen for capture requests from parent window
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'CAPTURE_STAMP_DUTY') {
        const value = findStampDutyValue();
        window.parent.postMessage({
          type: 'STAMP_DUTY_VALUE',
          value: value,
          success: value !== null
        }, '*');
      }
    });

    // Watch for DOM changes and automatically detect when results appear
    const observer = new MutationObserver(function(mutations) {
      const value = findStampDutyValue();
      if (value !== null && value !== lastCapturedValue) {
        lastCapturedValue = value;
        // Notify parent that a new value is available
        window.parent.postMessage({
          type: 'STAMP_DUTY_VALUE_AVAILABLE',
          value: value
        }, '*');
      }
    });

    // Start observing after a short delay to let calculator load
    setTimeout(() => {
      observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
      });
    }, 1000);
  </script>
</body>
</html>
