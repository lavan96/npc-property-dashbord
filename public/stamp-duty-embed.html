<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stamp Duty Calculator</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 16px;
      background: #ffffff;
    }
    #stamp-duty-calculator {
      width: 100%;
    }
    .source-link {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }
    .source-link a {
      color: #0066cc;
    }
  </style>
</head>
<body>
  <div class="source-link">
    Stamp Duty Calculator from <a href="https://calculatorsonline.com.au" target="_blank" rel="noopener noreferrer">calculatorsonline.com.au</a>
  </div>
  
  <div id="stamp-duty-calculator" class="orange-theme">
    <div id="stamp-duty-anchors">
      <noscript>Please enable JavaScript to use the Stamp Duty Calculator.</noscript>
    </div>
  </div>

  <script>
    // Parse state from URL query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const state = urlParams.get('state') || 'All';
    
    // Load the calculator script with the detected state
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://calculatorsonline.com.au/external/!main/stamp_duty.min.js';
    script.setAttribute('data-state', state);
    document.body.appendChild(script);

    // Store the last captured value
    let lastCapturedValue = null;

    // Function to find and extract stamp duty value from the calculator
    function findStampDutyValue() {
      // Strategy 1: Look for table rows or divs where the label is "Stamp Duty" (exact match)
      // and extract the value from a sibling/adjacent element
      const allElements = document.querySelectorAll('*');
      
      for (const el of allElements) {
        const text = (el.textContent || el.innerText || '').trim();
        
        // Look for elements that are specifically "Stamp Duty:" or "Stamp Duty" labels
        if (text === 'Stamp Duty:' || text === 'Stamp Duty') {
          // Check siblings for the value
          let sibling = el.nextElementSibling;
          while (sibling) {
            const siblingText = sibling.textContent || sibling.innerText || '';
            const match = siblingText.match(/\$\s*([\d,]+(?:\.\d{2})?)/);
            if (match) {
              const value = match[1].replace(/,/g, '');
              const numValue = parseFloat(value);
              if (numValue > 0) {
                return numValue;
              }
            }
            sibling = sibling.nextElementSibling;
          }
          
          // Check parent's other children (table row scenario)
          const parent = el.parentElement;
          if (parent) {
            const parentText = parent.textContent || parent.innerText || '';
            // Extract all dollar amounts from the parent
            const matches = [...parentText.matchAll(/\$\s*([\d,]+(?:\.\d{2})?)/g)];
            for (const match of matches) {
              const value = match[1].replace(/,/g, '');
              const numValue = parseFloat(value);
              // The stamp duty value should be significant (> $100 typically)
              if (numValue > 100) {
                return numValue;
              }
            }
          }
        }
      }

      // Strategy 2: Look for "Stamp Duty" text followed by a dollar amount on the same line
      const walker = document.createTreeWalker(
        document.body,
        NodeFilter.SHOW_TEXT,
        null,
        false
      );

      while (walker.nextNode()) {
        const text = walker.currentNode.textContent || '';
        // Match "Stamp Duty" followed by a dollar amount (possibly with other text between)
        const stampDutyMatch = text.match(/Stamp\s*Duty[:\s]*\$?\s*([\d,]+(?:\.\d{2})?)/i);
        if (stampDutyMatch) {
          const value = stampDutyMatch[1].replace(/,/g, '');
          const numValue = parseFloat(value);
          if (numValue > 100) {
            return numValue;
          }
        }
      }

      // Strategy 3: Scan all rows/containers looking for "Stamp Duty" label pattern
      const rows = document.querySelectorAll('tr, div, p, span');
      for (const row of rows) {
        const rowText = row.textContent || row.innerText || '';
        
        // Check if this row contains "Stamp Duty" but NOT "Total" (to avoid the totals row)
        if (/stamp\s*duty/i.test(rowText) && !/total/i.test(rowText)) {
          const matches = [...rowText.matchAll(/\$\s*([\d,]+(?:\.\d{2})?)/g)];
          // Find the largest value in this row (should be the stamp duty amount)
          let maxValue = 0;
          for (const match of matches) {
            const value = parseFloat(match[1].replace(/,/g, ''));
            if (value > maxValue && value > 100) {
              maxValue = value;
            }
          }
          if (maxValue > 0) {
            return maxValue;
          }
        }
      }

      // Strategy 4: Last resort - find the Fees section and get the Stamp Duty row value
      const feesSection = document.body.innerHTML;
      const stampDutyRowMatch = feesSection.match(/Stamp\s*Duty[^$]*\$\s*([\d,]+(?:\.\d{2})?)/i);
      if (stampDutyRowMatch) {
        const value = parseFloat(stampDutyRowMatch[1].replace(/,/g, ''));
        if (value > 100) {
          return value;
        }
      }

      return null;
    }

    // Listen for capture requests from parent window
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'CAPTURE_STAMP_DUTY') {
        const value = findStampDutyValue();
        window.parent.postMessage({
          type: 'STAMP_DUTY_VALUE',
          value: value,
          success: value !== null
        }, '*');
      }
    });

    // Watch for DOM changes and automatically detect when results appear
    const observer = new MutationObserver(function(mutations) {
      const value = findStampDutyValue();
      if (value !== null && value !== lastCapturedValue) {
        lastCapturedValue = value;
        // Notify parent that a new value is available
        window.parent.postMessage({
          type: 'STAMP_DUTY_VALUE_AVAILABLE',
          value: value
        }, '*');
      }
    });

    // Start observing after a short delay to let calculator load
    setTimeout(() => {
      observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
      });
    }, 1000);
  </script>
</body>
</html>
